name: Update Instagram Followers

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6am UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit followers.json

    steps:
      - uses: actions/checkout@v4

      - name: Fetch follower counts from Instagram Graph API
        run: node .github/scripts/update-followers.js
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          IG_ID_REYSTONE:  ${{ secrets.IG_ID_REYSTONE }}
          IG_ID_STYLOS:    ${{ secrets.IG_ID_STYLOS }}
          IG_ID_KAIROSLAB: ${{ secrets.IG_ID_KAIROSLAB }}

      - name: Commit and push if counts changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add followers.json
          git diff --staged --quiet || (
            git commit -m "chore: update Instagram follower counts" &&
            git push
          )
